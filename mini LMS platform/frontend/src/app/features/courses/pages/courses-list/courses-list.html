<app-header />

<main class="min-h-screen bg-[#f8fafc] text-slate-800">
  <div class="max-w-7xl mx-auto px-6 py-12 md:py-16">
    <!-- Hero Header Section -->
    <div class="mb-10">
      <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight mb-3">
        Explore Courses
      </h1>
      <p class="text-slate-600 text-sm md:text-base max-w-2xl leading-relaxed">
        Discover new skills, advance your career, and expand your horizons with our expert-led
        programs.
      </p>
    </div>

    <!-- Category Filter Tabs & Search using hlmBtn -->
    <div class="flex flex-col items-center justify-between gap-4 mb-10">
      <div class="relative w-full md:max-w-xl lg:max-w-xl overflow-hidden">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
          <svg
            class="w-4 h-4 text-slate-400"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            />
          </svg>
        </span>
        <input
          hlmInput
          type="text"
          (input)="onSearch($event)"
          placeholder="Search courses..."
          class="w-full pl-9 pr-4 py-2 text-sm text-slate-700 bg-white border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
        />
      </div>
      <div
        class="flex items-center gap-2 overflow-x-auto w-full max-w-full justify-start md:justify-center py-1 hide-scrollbar"
      >
        @for (category of categories(); track category) {
          <button
            hlmBtn
            (click)="selectCategory(category)"
            [class]="
              activeCategory() === category
                ? 'bg-blue-600 text-white hover:bg-blue-700 border-none'
                : 'bg-[#eaedf6] hover:bg-[#dfe4f1] text-[#2e3e5c] border-none shadow-none'
            "
            class="shrink-0 font-semibold px-5 py-2 rounded-full text-xs transition-colors cursor-pointer h-auto"
          >
            {{ category }}
          </button>
        }
      </div>
    </div>

    <!-- Courses Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      @for (course of courses(); track course.title) {
        <app-course-card [course]="course" />
      }
    </div>

    <!-- Load More Button using hlmBtn -->
    <div class="mt-12 flex justify-center">
      <button
        hlmBtn
        variant="outline"
        class="border border-slate-300 hover:border-slate-400 bg-white hover:bg-slate-50 text-slate-700 font-bold px-6 py-2.5 rounded-xl text-xs flex items-center gap-2 transition-all cursor-pointer shadow-sm h-auto"
      >
        <span>Load More Courses</span>
        <svg
          class="w-3.5 h-3.5 text-slate-500"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18"
          />
        </svg>
      </button>
    </div>
  </div>
</main>
<app-footer />
<app-mobile-nav [items]="mobileNavItems()" />
