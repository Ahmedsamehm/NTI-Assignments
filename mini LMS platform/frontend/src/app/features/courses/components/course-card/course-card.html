<div
  hlmCard
  class="bg-white border border-slate-200/80 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow flex flex-col h-full p-0"
>
  <!-- Card Image & Category Badge (using hlmBadge) -->
  <a
    [routerLink]="['/courses', course()._id]"
    class="block relative aspect-video w-full overflow-hidden bg-slate-100 cursor-pointer"
  >
    <img
      [src]="course().image || '/images/course_ui_ux.png'"
      [alt]="course().title"
      class="w-full h-full object-cover object-center hover:scale-102 transition-transform duration-300"
    />
    <span
      hlmBadge
      variant="outline"
      class="absolute top-3 left-3 bg-white/95 backdrop-blur-sm border border-slate-200/50 text-slate-800 text-[10px] font-bold px-2.5 py-1 rounded shadow-sm uppercase tracking-wide"
    >
      {{ course().category }}
    </span>
  </a>

  <!-- Card Content Body (using hlmCardContent) -->
  <div hlmCardContent class="pt-5 px-5 pb-3 flex flex-col grow space-y-3!">
    <!-- Title -->
    <h3
      hlmCardTitle
      [routerLink]="['/courses', course()._id]"
      class="text-base font-bold text-slate-900 leading-snug hover:text-blue-600 transition-colors cursor-pointer"
    >
      {{ course().title }}
    </h3>

    <!-- Instructor with Icon -->
    <div class="flex items-center gap-1.5 text-xs text-slate-500 font-semibold mb-3">
      <svg
        class="w-3.5 h-3.5 text-slate-400"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
        />
      </svg>
      <span>{{ course().instructor?.name || course().instructor }}</span>
    </div>

    <!-- Description (using hlmCardDescription) -->
    <p hlmCardDescription class="text-xs text-slate-500 leading-relaxed line-clamp-2">
      {{ course().description }}
    </p>
  </div>

  <!-- Card Footer Area (using hlmCardFooter) -->
  <div
    hlmCardFooter
    class="flex items-center justify-between mt-auto p-5 pt-3 border-t border-slate-100/80 bg-white rounded-b-2xl"
  >
    <!-- Rating & Reviews -->
    <div class="flex items-center gap-1 text-xs font-bold text-slate-800">
      <span class="text-amber-500 text-sm">★</span>
      <span>{{ course().rating }}</span>
      <span class="text-slate-400 font-normal">({{ course().reviewsCount }})</span>
    </div>

    <!-- Enroll Button using hlmBtn -->
    <button
      hlmBtn
      [routerLink]="['/courses', course()._id]"
      class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-2 rounded-lg transition-colors cursor-pointer shadow-sm shadow-blue-500/5 h-auto border-none"
    >
      Enroll
    </button>
  </div>
</div>
