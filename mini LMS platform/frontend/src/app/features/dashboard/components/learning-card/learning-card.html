<div class="bg-white border border-slate-200 rounded-3xl overflow-hidden flex flex-col justify-between shadow-sm hover:shadow-md transition-shadow h-full">
  <!-- Top Thumbnail & Category -->
  <div class="relative w-full h-44 overflow-hidden select-none">
    @if (image()) {
      <img [src]="image()" (error)="handleImageError($event)" alt="Course Thumbnail" class="w-full h-full object-cover" />
    } @else {
      <!-- Beautiful premium dynamic gradient placeholders if no image is provided -->
      <div
        class="w-full h-full flex items-center justify-center"
        [class.bg-gradient-to-tr]="true"
        [class.from-blue-600]="category() === 'Data Science'"
        [class.to-indigo-300]="category() === 'Data Science'"
        [class.from-purple-600]="category() === 'Design'"
        [class.to-pink-300]="category() === 'Design'"
        [class.from-emerald-600]="category() === 'Web Dev' || category() === 'Development'"
        [class.to-teal-300]="category() === 'Web Dev' || category() === 'Development'"
        [class.from-slate-700]="category() !== 'Data Science' && category() !== 'Design' && category() !== 'Web Dev' && category() !== 'Development'"
        [class.to-slate-400]="category() !== 'Data Science' && category() !== 'Design' && category() !== 'Web Dev' && category() !== 'Development'"
      >
        <!-- Icon representation inside gradient -->
        <svg class="w-12 h-12 text-white/40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
      </div>
    }

    <!-- Category Tag Overlay -->
    <span
      class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-3.5 py-1 rounded-full text-[11px] font-bold border"
      [class.border-blue-100]="category() === 'Data Science'"
      [class.text-blue-600]="category() === 'Data Science'"
      [class.border-purple-100]="category() === 'Design'"
      [class.text-purple-600]="category() === 'Design'"
      [class.border-emerald-100]="category() === 'Web Dev' || category() === 'Development'"
      [class.text-emerald-600]="category() === 'Web Dev' || category() === 'Development'"
      [class.border-slate-200]="category() !== 'Data Science' && category() !== 'Design' && category() !== 'Web Dev' && category() !== 'Development'"
      [class.text-slate-600]="category() !== 'Data Science' && category() !== 'Design' && category() !== 'Web Dev' && category() !== 'Development'"
    >
      {{ category() }}
    </span>
  </div>

  <!-- Body Content -->
  <div class="p-5 flex-1 flex flex-col justify-between">
    <div class="mb-4">
      <h3 class="text-base font-extrabold text-slate-800 line-clamp-2 leading-snug mb-1">
        {{ courseTitle() }}
      </h3>
      <span class="text-xs font-semibold text-slate-400">
        {{ moduleTitle() }}
      </span>
    </div>

    <!-- Progress Tracker -->
    <div class="mb-5">
      <div class="flex items-center justify-between text-[11px] font-bold mb-2">
        <span class="text-slate-400 uppercase tracking-wider">Progress</span>
        <span [class.text-blue-600]="progress() < 100" [class.text-emerald-600]="progress() === 100">
          {{ progress() }}%
        </span>
      </div>
      <!-- Track -->
      <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
        <!-- Bar -->
        <div
          class="h-full rounded-full transition-all duration-500"
          [style.width.%]="progress()"
          [class.bg-blue-600]="progress() < 100"
          [class.bg-emerald-600]="progress() === 100"
        ></div>
      </div>
    </div>

    <!-- Action Button -->
    <div class="w-full">
      @if (progress() < 100) {
        <button
          (click)="action.emit()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl text-xs flex items-center justify-center gap-1.5 transition-colors cursor-pointer border-none shadow-sm"
        >
          <span>Continue Learning</span>
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </button>
      } @else {
        <button
          (click)="action.emit()"
          class="w-full bg-white hover:bg-slate-50 border border-slate-200 text-slate-600 font-semibold py-2.5 rounded-xl text-xs flex items-center justify-center gap-1.5 transition-all cursor-pointer shadow-sm"
        >
          <span>Review Course</span>
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18" />
          </svg>
        </button>
      }
    </div>
  </div>
</div>
