<header
  class="flex items-end justify-end px-4 md:px-8 py-4 bg-white border-b border-slate-200 w-full"
>
  <!-- Right: User Avatar -->
  <div class="flex items-center justify-center gap-3 ml-4">
    <div
      class="w-9 h-9 rounded-full bg-blue-100 border border-blue-200 flex items-center justify-center font-bold text-blue-600 text-sm select-none shrink-0"
    >
      @if (user()?.name) {
        {{ user()!.name.substring(0, 1).toUpperCase() }}
      } @else {
        <svg
          class="h-5 w-5 text-blue-500"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          />
        </svg>
      }
    </div>
    @if (user()?.name) {
      <span class="hidden md:block text-sm font-semibold text-slate-700">{{ user()!.name }}</span>
    }
  </div>
</header>
