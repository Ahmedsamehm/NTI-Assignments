<div class="bg-white border border-slate-200 rounded-2xl p-6 flex items-center justify-between shadow-sm hover:shadow-md transition-shadow">
  <div class="flex flex-col gap-1">
    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">{{ title() }}</span>
    <span
      class="text-3xl font-extrabold tracking-tight"
      [class.text-blue-600]="type() === 'courses'"
      [class.text-emerald-600]="type() === 'modules'"
      [class.text-orange-600]="type() === 'streak'"
    >
      {{ value() }}
    </span>
  </div>

  <div>
    @if (type() === 'courses') {
      <div class="w-12 h-12 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center">
        <!-- Book Icon -->
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
      </div>
    } @else if (type() === 'modules') {
      <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center">
        <!-- Checkbox Shield / Check Icon -->
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
    } @else if (type() === 'streak') {
      <div class="w-12 h-12 rounded-full bg-orange-50 text-orange-600 flex items-center justify-center">
        <!-- Fire Icon -->
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
    }
  </div>
</div>
