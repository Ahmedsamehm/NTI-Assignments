<aside
  class="hidden md:flex flex-col w-64 h-screen bg-white border-r border-slate-200 justify-between p-6"
>

  <div class="flex flex-col gap-8">

    <div class="flex items-center justify-between">
      <span class="text-xl font-extrabold text-blue-600 tracking-tight">MINI LMS</span>
    </div>


    <div class="flex flex-col gap-6">

      <div>
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-3"
          >Menu</span
        >
        <nav class="flex flex-col gap-1.5">
          <a
            routerLink="/dashboard"
            routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
            [routerLinkActiveOptions]="{ exact: true }"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all text-sm group"
          >
            <svg class="h-5 w-5 stroke-current transition-colors" fill="none" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
            Dashboard
          </a>

          @if (authService.user()?.role === 'admin') {

            <a
              routerLink="/dashboard/admin"
              routerLinkActive="bg-red-50 text-red-600 font-semibold"
              class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-red-50 hover:text-red-700 transition-all text-sm group"
            >
              <svg class="h-5 w-5 stroke-current transition-colors" fill="none" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
              </svg>
              Admin Panel
            </a>
          } @else {

            <a
              routerLink="/dashboard/courses"
              routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
              class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all text-sm group"
            >
              <svg class="h-5 w-5 stroke-current transition-colors" fill="none" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0112 20.055a11.952 11.952 0 01-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
              </svg>
              Courses
            </a>

            @if (authService.user()?.role === 'instructor') {

              <a
                routerLink="/dashboard/my-courses"
                routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
                class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all text-sm group"
              >
                <svg class="h-5 w-5 stroke-current transition-colors" fill="none" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                My Courses
              </a>
            } @else {

              <a
                routerLink="/dashboard/my-courses"
                routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
                class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all text-sm group"
              >
                <svg class="h-5 w-5 stroke-current transition-colors" fill="none" viewBox="0 0 24 24" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                My Learning
              </a>
            }
          }
        </nav>
      </div>


      <div>
        <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider block mb-3">Settings</span>
        <nav class="flex flex-col gap-1.5">
          <a
            routerLink="/dashboard/profile"
            routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-all text-sm group"
          >
            <svg class="h-5 w-5 stroke-current transition-colors" fill="none" viewBox="0 0 24 24" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            Profile
          </a>
        </nav>
      </div>

    </div>
  </div>


  <button
    (click)="logout()"
    class="flex items-center gap-3 w-full px-4 py-3.5 rounded-xl text-red-600 hover:bg-red-50 transition-all text-sm font-semibold cursor-pointer border-none bg-transparent text-left"
  >
    <svg class="h-5 w-5 stroke-current" fill="none" viewBox="0 0 24 24" stroke-width="2">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
      />
    </svg>
    Sign Out
  </button>
</aside>
