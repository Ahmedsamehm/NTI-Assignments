@if (authService.user()) {
  <!-- Shared Dashboard Shell: sidebar + header wrap all role layouts -->
  <div class="flex h-screen bg-[#f8fafc] text-slate-800 font-sans overflow-hidden">

    <!-- Shared Sidebar -->
    <app-dashboard-sidebar />

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col overflow-hidden min-w-0">

      <!-- Shared Header -->
      <app-dashboard-header [user]="authService.user()" />

      <!-- Sub-page Content -->
      <div class="flex-1 overflow-y-auto">
        <router-outlet></router-outlet>
      </div>
    </div>
    <app-mobile-nav [items]="dashboardNavItems" />
  </div>
} @else {
  <!-- Loading state while resolving user -->
  <div class="flex h-screen items-center justify-center bg-slate-50">
    <div class="text-center">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div>
      <p class="text-sm text-slate-500 mt-4">Loading dashboard...</p>
    </div>
  </div>
}
