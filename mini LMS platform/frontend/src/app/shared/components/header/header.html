<header
  class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 transition-all duration-300"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16 md:h-20">
      <!-- Brand Logo -->
      <a routerLink="/" class="flex items-center gap-2 group select-none">
        <div
          class="w-8 h-8 rounded-lg bg-gradient-to-tr from-blue-600 to-blue-300 flex items-center justify-center shadow-md shadow-blue-500/25 transition-transform duration-300 group-hover:scale-105"
        >
          <svg
            class="w-4 h-4 text-white"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"
            />
          </svg>
        </div>
        <span
          class="text-xl font-extrabold text-slate-900 tracking-tight transition-colors group-hover:text-blue-600"
        >
          Mini LMS
        </span>
      </a>

      <!-- Middle Navigation (Desktop) -->
      <nav class="hidden md:flex items-center gap-8">
        <a
          routerLink="/courses"
          class="text-sm font-semibold text-slate-600 hover:text-slate-900 transition-colors"
          >Courses</a
        >
      </nav>

      <!-- Right Actions (Desktop) -->
      <div class="hidden md:flex items-center gap-4">
        @if (authService.user()) {
          <a
            routerLink="/dashboard"
            class="text-sm font-semibold text-slate-600 hover:text-slate-900 transition-colors px-3 py-2 rounded-lg hover:bg-slate-50"
          >
            Dashboard
          </a>
          <span class="text-sm font-semibold text-slate-700 select-none">
            {{ authService.user()?.name }}
          </span>
          <button
            hlmBtn
            variant="outline"
            (click)="logout()"
            class="border-slate-200 bg-white/50 backdrop-blur-sm text-slate-700 font-semibold px-5 py-2.5 rounded-xl hover:bg-slate-50 text-center transition-all duration-200 hover:-translate-y-0.5 active:translate-y-0 cursor-pointer"
          >
            Log Out
          </button>
        } @else {
          <a
            routerLink="/login"
            class="text-sm font-semibold text-slate-600 hover:text-slate-900 transition-colors px-3 py-2 rounded-lg hover:bg-slate-50"
          >
            Log In
          </a>
          <a
            hlmBtn
            variant="default"
            routerLink="/register"
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2.5 rounded-xl shadow-md shadow-blue-500/10 text-sm transition-all duration-200 hover:-translate-y-0.5"
          >
            Get Started
          </a>
        }
      </div>
    </div>
  </div>
</header>
