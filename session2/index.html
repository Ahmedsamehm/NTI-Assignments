<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Meal Finder</h1>
    <p class="subtitle">Search meals by ingredient</p>

    <div class="search-box">
      <input
        type="text"
        id="input"
        placeholder="Enter ingredient (e.g. chicken)"
      >
      <button id="search-btn">Search</button>
    </div>

    <p class="message">Search for an ingredient to see meals.</p>
    <div id="category" class="">
     
    </div>
    
    <div id="meals"></div>

  </div>
  <script src="main.js"></script>
</body>
</html>
